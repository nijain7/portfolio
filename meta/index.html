<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "../style.css">
    <link rel = "stylesheet" href = "style.css">
    <script src="main.js" type="module"></script>
    <script src="../global.js" type = "module"></script> 
    <title>Meta</title>
</head>
<body>
    <h1>Meta</h1>
    <div style="display: flex; flex: 1; align-items: baseline;">
      <label>
        Show commits until:
        <input type="range" id="commit-progress" min="0" max="100" value="100" style="width: 20rem;" >
      </label>
      <time id="commit-max-time" style="margin-left: auto;"></time>
    </div>
    <dl id="files">
      <!-- we want the following structure for each file:
      <div>
        <dt>
          <code>{file.name}</code>
        </dt>
        <dd>{file.lines.length} lines</dd>
      </div>
      -->
    </dl>
    <div id="stats"></div>
    <h2>Commits by time of day</h2>
    <div id="chart"></div>
    <dl id="language-breakdown" class="stats"></dl>
    <p id="selection-count">No commits selected</p>
    <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd>
          <a href="" id="commit-link" target="_blank"></a>
        </dd>
      
        <dt>Date</dt>
        <dd id="commit-date"></dd>
        <dt>Time</dt>
        <dd id="commit-time"></dd>
      
        <dt>Author</dt>
        <dd id="commit-author"></dd>
      
        <dt>Lines Edited</dt>
        <dd id="commit-lines"></dd>
      
        <!-- Add: Time, author, lines edited -->
      </dl>


</body>
</html>
